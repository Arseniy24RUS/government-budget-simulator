<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Educational Methodology</title>
  <desc id="desc">The simulator turns constraints into repeatable policy-analysis practice.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .grid { stroke: #dbe4ef; stroke-width: 1; opacity: .75; }
      .box { fill: #ffffff; stroke: #d8e2ef; stroke-width: 2; filter: url(#shadow); }
      .title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 17px 'Segoe UI', Arial, sans-serif; fill: #526071; }
      .heading { font: 800 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 19px 'Segoe UI', Arial, sans-serif; fill: #526071; }
      .chip { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .arrow { stroke: #64748b; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="520"/>
  <path class="grid" d="M0 440H1200M0 350H1200M0 260H1200M0 170H1200M0 80H1200"/>
  <path class="grid" d="M120 0V520M300 0V520M480 0V520M660 0V520M840 0V520M1020 0V520"/>
  <text class="heading" x="70" y="72">Educational Methodology</text>
  <text class="subtitle" x="70" y="106">The simulator turns constraints into repeatable policy-analysis practice.</text>
<rect class="box" x="70" y="165" width="220" height="170" rx="18"/>
<rect x="70" y="165" width="220" height="8" rx="4" fill="#2563eb"/>
<text class="title" x="94" y="203">Constraints</text>
<text class="body" x="94" y="243">Finite budget, tax burden,</text>
<text class="body" x="94" y="267">active-measure limits,</text>
<text class="body" x="94" y="291">scenario shocks.</text>
<path class="arrow" d="M310 250.0 H322"/>
<rect class="box" x="350" y="165" width="220" height="170" rx="18"/>
<rect x="350" y="165" width="220" height="8" rx="4" fill="#f59e0b"/>
<text class="title" x="374" y="203">Decisions</text>
<text class="body" x="374" y="243">Students choose priorities</text>
<text class="body" x="374" y="267">and justify trade-offs.</text>
<path class="arrow" d="M590 250.0 H602"/>
<rect class="box" x="630" y="165" width="220" height="170" rx="18"/>
<rect x="630" y="165" width="220" height="8" rx="4" fill="#16a34a"/>
<text class="title" x="654" y="203">Yearly simulation</text>
<text class="body" x="654" y="243">The model applies events,</text>
<text class="body" x="654" y="267">investments, and policy</text>
<text class="body" x="654" y="291">effects.</text>
<path class="arrow" d="M870 250.0 H882"/>
<rect class="box" x="910" y="165" width="220" height="170" rx="18"/>
<rect x="910" y="165" width="220" height="8" rx="4" fill="#dc2626"/>
<text class="title" x="934" y="203">Feedback and grade</text>
<text class="body" x="934" y="243">KPI and support produce</text>
<text class="body" x="934" y="267">discussion-ready assessment.</text>
<rect x="70" y="396" width="162" height="42" rx="21" fill="#dbeafe" stroke="#93c5fd"/>
<text class="chip" x="92" y="423">trade-offs</text>
<rect x="250" y="396" width="162" height="42" rx="21" fill="#dcfce7" stroke="#86efac"/>
<text class="chip" x="272" y="423">reflection</text>
<rect x="430" y="396" width="130" height="42" rx="21" fill="#ffedd5" stroke="#fdba74"/>
<text class="chip" x="452" y="423">grade</text>
</svg>
